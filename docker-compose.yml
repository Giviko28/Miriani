# Infrastructure for local development.
# Ollama runs on the HOST (for GPU access), not here — the ai-service points at it via
# OLLAMA_BASE_URL=http://host.docker.internal:11434.
#
# Application services (api, web, ai-service) are added to this file as each is scaffolded
# during its milestone. For now this brings up the two datastores.

services:
  # Primary datastore. The app uses PostgreSQL (same engine as the cloud deployment on Neon),
  # so one codebase/branch runs both locally and in the cloud — only the connection string
  # differs. Connection string for the gateway: see appsettings.json ConnectionStrings:Default.
  postgres:
    image: postgres:16
    container_name: bpa-postgres
    environment:
      POSTGRES_USER: bpa
      POSTGRES_PASSWORD: bpa_dev_pass # dev only
      POSTGRES_DB: BpaDb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # Legacy MS SQL service, kept for reference. No longer used by the app (which is on
  # PostgreSQL now); safe to remove if you don't need old MS SQL data.
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: bpa-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_strong_Pass123" # dev only; override via .env in real use
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql

  chromadb:
    image: chromadb/chroma:latest
    container_name: bpa-chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/data

  # Local SMTP sink for the email-driven business processes. Mailpit accepts any mail on
  # :1025 and shows it in a web inbox at http://localhost:8025 — so live demos can prove an
  # email/invoice/approval actually "sent" without touching a real provider.
  mailpit:
    image: axllent/mailpit:latest
    container_name: bpa-mailpit
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # web inbox
    environment:
      MP_MAX_MESSAGES: "500"

volumes:
  postgres-data:
  mssql-data:
  chroma-data:
